name: G
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev g++
      - run: g++ -O3 main.cpp -o m -lcurl
      - env:
          sksdkskdsk: ${{ secrets.sksdkskdsk }}
          dkskdsk: ${{ secrets.dkskdsk }}
          sksdks: ${{ secrets.sksdks }}
        run: ./m
      - run: |
          git config --global user.name "b"
          git config --global user.email "b@b.com"
          git add playlist.m3u
          if ! git diff --staged --quiet; then
            git commit -m "u"
            git push
          fi
